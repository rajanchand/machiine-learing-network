<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="AnomalyGuard Profile — Manage user account details and view activity logs">
    <title>Profile — AnomalyGuard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
    <link href="css/style.css" rel="stylesheet">
    <style>
        .profile-avatar-large {
            width: 90px;
            height: 90px;
            border-radius: 50%;
            background: var(--primary-light);
            color: var(--primary);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 36px;
            font-weight: 700;
            border: 4px solid var(--primary-mid);
            margin: 0 auto 16px;
        }
    </style>
</head>
<body>
    <div class="app-wrapper" id="app">
        <div class="main-content">
            <!-- Topbar injected by JS -->
            <div class="page-content">
                <div class="breadcrumb-nav"><a href="dashboard.html">Home</a> / Profile</div>
                
                <div class="page-header">
                    <h2>User Profile</h2>
                </div>

                <div class="row g-4">
                    <!-- Column 1: Profile Details Card -->
                    <div class="col-lg-4">
                        <div class="card text-center mb-4">
                            <div class="card-body py-4">
                                <div class="profile-avatar-large" id="profileAvatar">U</div>
                                <h4 class="fw-700 mb-1" id="profileName">User Full Name</h4>
                                <p class="text-muted mb-3" id="profileRole">System Administrator</p>
                                <span class="badge bg-success-light text-success px-3 py-2 text-capitalize mb-2" id="profileStatus">Active</span>
                                
                                <hr class="my-4">

                                <div class="text-start">
                                    <div class="mb-3">
                                        <small class="text-muted fw-600 uppercase small">Username</small>
                                        <div class="fw-600" id="detailUsername">@username</div>
                                    </div>
                                    <div class="mb-3">
                                        <small class="text-muted fw-600 uppercase small">Email Address</small>
                                        <div class="fw-600" id="detailEmail">email@domain.com</div>
                                    </div>
                                    <div>
                                        <small class="text-muted fw-600 uppercase small">Member Since</small>
                                        <div class="fw-600" id="detailCreated">January 1, 2026</div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- Column 2: Edit Form & Activity Trail -->
                    <div class="col-lg-8">
                        <!-- Edit details form -->
                        <div class="card mb-4">
                            <div class="card-header">
                                <h5 class="card-title mb-0"><i class="fas fa-user-edit me-2 text-primary"></i>Update Profile Details</h5>
                            </div>
                            <div class="card-body">
                                <form id="profileForm">
                                    <div class="row g-3 mb-3">
                                        <div class="col-md-6">
                                            <label for="inputFullName" class="form-label fw-600">Full Name</label>
                                            <input type="text" class="form-control" id="inputFullName" required>
                                        </div>
                                        <div class="col-md-6">
                                            <label for="inputEmail" class="form-label fw-600">Email Address</label>
                                            <input type="email" class="form-control" id="inputEmail" required>
                                        </div>
                                    </div>
                                    <button type="submit" class="btn btn-primary px-4">
                                        <i class="fas fa-save me-2"></i> Save Changes
                                    </button>
                                </form>
                            </div>
                        </div>

                        <!-- User recent activity logs -->
                        <div class="card">
                            <div class="card-header">
                                <h5 class="card-title mb-0"><i class="fas fa-history me-2 text-primary"></i>Your Recent Security Actions</h5>
                            </div>
                            <div class="card-body p-0">
                                <div class="table-responsive">
                                    <table class="table table-hover mb-0">
                                        <thead>
                                            <tr>
                                                <th>Action</th>
                                                <th>Resource</th>
                                                <th>Details</th>
                                                <th>Timestamp</th>
                                            </tr>
                                        </thead>
                                        <tbody id="activityList">
                                            <!-- Dynamically filled -->
                                            <tr>
                                                <td colspan="4" class="text-center py-4 text-muted">No activities recorded in this session.</td>
                                            </tr>
                                        </tbody>
                                    </table>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/api.js"></script>
    <script src="js/common.js"></script>
    <script>
        // Initialize layout
        if (!initPageLayout('profile', 'Profile')) throw new Error('Auth required');

        async function loadProfile() {
            try {
                const p = await API.getProfile();
                if (p) {
                    // Update header name
                    document.getElementById('profileName').textContent = p.full_name || p.username;
                    document.getElementById('profileRole').textContent = p.role.charAt(0).toUpperCase() + p.role.slice(1);
                    document.getElementById('profileStatus').textContent = p.status;
                    
                    // Update details fields
                    document.getElementById('detailUsername').textContent = `@${p.username}`;
                    document.getElementById('detailEmail').textContent = p.email;
                    document.getElementById('detailCreated').textContent = formatDateTime(p.created_at);
                    
                    // Update form values
                    document.getElementById('inputFullName').value = p.full_name || '';
                    document.getElementById('inputEmail').value = p.email || '';

                    // Avatar initials
                    const initials = p.username.substring(0, 2).toUpperCase();
                    document.getElementById('profileAvatar').textContent = initials;
                }

                // Load activity list
                const activities = await API.get('/api/v1/profile/activity');
                const list = document.getElementById('activityList');
                if (activities && activities.length > 0) {
                    list.innerHTML = activities.map(act => `
                        <tr>
                            <td class="fw-600">${act.action}</td>
                            <td>${act.resource || '—'}</td>
                            <td class="text-muted small">${act.details || '—'}</td>
                            <td class="text-mono small text-muted">${formatDateTime(act.timestamp)}</td>
                        </tr>
                    `).join('');
                } else {
                    list.innerHTML = `<tr><td colspan="4" class="text-center py-4 text-muted">No activities found.</td></tr>`;
                }

            } catch (err) {
                showToast('Failed to load user profile information.', 'error');
            }
        }

        document.getElementById('profileForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const data = {
                full_name: document.getElementById('inputFullName').value,
                email: document.getElementById('inputEmail').value
            };

            try {
                const res = await API.updateProfile(data);
                if (res) {
                    showToast('Profile updated successfully!');
                    loadProfile();
                } else {
                    showToast('Failed to save profile changes.', 'error');
                }
            } catch (error) {
                showToast('An error occurred while saving profile changes.', 'error');
            }
        });

        // Load profile on start
        loadProfile();
    </script>
</body>
</html>
