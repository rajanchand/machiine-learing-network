<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>ML Prediction — AnomalyGuard</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"><link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet"><link href="css/style.css" rel="stylesheet"></head><body>
<div class="app-wrapper" id="app"><div class="main-content"><div class="page-content">
    <div class="breadcrumb-nav"><a href="dashboard.html">Home</a> / ML Prediction</div>
    <div class="page-header"><h2>Machine Learning Prediction</h2></div>

    <div class="row g-3 mb-3">
        <!-- Real-Time Prediction -->
        <div class="col-lg-6">
            <div class="card"><div class="card-header"><h5 class="card-title mb-0"><i class="fas fa-bolt me-2 text-warning"></i>Real-Time Prediction</h5></div>
            <div class="card-body">
                <div class="mb-3"><label class="form-label fw-600">Select Model</label>
                    <select class="form-select" id="modelSelect"><option value="random_forest">Random Forest</option><option value="isolation_forest">Isolation Forest</option><option value="decision_tree">Decision Tree</option><option value="xgboost">XGBoost</option></select>
                </div>
                <div class="row g-2 mb-3">
                    <div class="col-6"><label class="form-label" style="font-size:12px">Duration</label><input type="number" class="form-control form-control-sm" id="f_duration" value="0.5"></div>
                    <div class="col-6"><label class="form-label" style="font-size:12px">Src Bytes</label><input type="number" class="form-control form-control-sm" id="f_src_bytes" value="500"></div>
                    <div class="col-6"><label class="form-label" style="font-size:12px">Dst Bytes</label><input type="number" class="form-control form-control-sm" id="f_dst_bytes" value="200"></div>
                    <div class="col-6"><label class="form-label" style="font-size:12px">Count</label><input type="number" class="form-control form-control-sm" id="f_count" value="10"></div>
                    <div class="col-6"><label class="form-label" style="font-size:12px">Srv Count</label><input type="number" class="form-control form-control-sm" id="f_srv_count" value="5"></div>
                    <div class="col-6"><label class="form-label" style="font-size:12px">Serror Rate</label><input type="number" class="form-control form-control-sm" id="f_serror_rate" value="0.0" step="0.01"></div>
                </div>
                <button class="btn btn-primary w-100" onclick="runPrediction()"><i class="fas fa-play me-1"></i>Run Prediction</button>
                <div id="predResult" class="mt-3 d-none">
                    <div class="alert" id="predAlert"></div>
                </div>
            </div></div>
        </div>

        <!-- Train Model -->
        <div class="col-lg-6">
            <div class="card"><div class="card-header"><h5 class="card-title mb-0"><i class="fas fa-graduation-cap me-2 text-primary"></i>Train Model</h5></div>
            <div class="card-body">
                <div class="mb-3"><label class="form-label fw-600">Model Type</label>
                    <select class="form-select" id="trainModel"><option value="random_forest">Random Forest</option><option value="isolation_forest">Isolation Forest</option><option value="decision_tree">Decision Tree</option><option value="xgboost">XGBoost</option></select>
                </div>
                <button class="btn btn-success w-100 mb-3" onclick="trainModel()"><i class="fas fa-cogs me-1"></i>Train Model</button>
                <div id="trainResult" class="d-none"></div>
            </div></div>

            <div class="card mt-3"><div class="card-header"><h5 class="card-title mb-0"><i class="fas fa-chart-bar me-2 text-success"></i>Feature Importance</h5></div>
            <div class="card-body"><canvas id="featureChart" height="250"></canvas></div></div>
        </div>
    </div>

    <!-- Prediction History -->
    <div class="table-container">
        <div class="table-header"><h5><i class="fas fa-history me-2"></i>Prediction History</h5></div>
        <div class="table-responsive"><table class="table table-hover table-sm mb-0"><thead><tr><th>Model</th><th>Result</th><th>Confidence</th><th>Label</th><th>Source IP</th><th>Dest IP</th><th>Time</th></tr></thead><tbody id="predBody"><tr><td colspan="7" class="text-center text-muted py-4">Loading...</td></tr></tbody></table></div>
        <div class="pagination-wrapper"><span id="predInfo">—</span><div id="predPag"></div></div>
    </div>
</div></div></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script src="js/auth.js"></script><script src="js/api.js"></script><script src="js/common.js"></script>
<script>
    if(!initPageLayout('prediction','ML Prediction'))throw new Error('Auth');
    let featureChart;

    async function runPrediction(){
        const model=document.getElementById('modelSelect').value;
        const features={
            duration:parseFloat(document.getElementById('f_duration').value),
            src_bytes:parseFloat(document.getElementById('f_src_bytes').value),
            dst_bytes:parseFloat(document.getElementById('f_dst_bytes').value),
            count:parseFloat(document.getElementById('f_count').value),
            srv_count:parseFloat(document.getElementById('f_srv_count').value),
            serror_rate:parseFloat(document.getElementById('f_serror_rate').value),
        };
        const r=await API.predict(model,features);
        if(r){
            const div=document.getElementById('predResult');div.classList.remove('d-none');
            const alert=document.getElementById('predAlert');
            alert.className=`alert ${r.is_anomaly?'alert-danger':'alert-success'}`;
            alert.innerHTML=`<strong>${r.is_anomaly?'⚠️ ANOMALY DETECTED':'✅ Normal Traffic'}</strong><br>
            Model: ${r.model_name} | Label: ${r.prediction_label} | Confidence: ${(r.confidence*100).toFixed(1)}%`;
            loadPredictions(1);
        }
    }

    async function trainModel(){
        const type=document.getElementById('trainModel').value;
        const div=document.getElementById('trainResult');
        div.innerHTML='<div class="alert alert-info"><span class="spinner-border spinner-border-sm me-2"></span>Training in progress...</div>';
        div.classList.remove('d-none');
        const r=await API.trainModel(type);
        if(r&&r.metrics){
            div.innerHTML=`<div class="alert alert-success"><strong>✅ Training Complete</strong><br>
            Accuracy: ${(r.metrics.accuracy*100).toFixed(2)}% | Precision: ${(r.metrics.precision*100).toFixed(2)}% |
            Recall: ${(r.metrics.recall*100).toFixed(2)}% | F1: ${(r.metrics.f1_score*100).toFixed(2)}%</div>`;
            loadFeatureImportance(type);
        }
    }

    async function loadFeatureImportance(model){
        const r=await API.getFeatureImportance(model||'random_forest');
        if(r&&r.feature_importance){
            const entries=Object.entries(r.feature_importance).sort((a,b)=>b[1]-a[1]).slice(0,10);
            if(featureChart)featureChart.destroy();
            featureChart=new Chart(document.getElementById('featureChart'),{
                type:'bar',data:{labels:entries.map(e=>e[0]),datasets:[{label:'Importance',data:entries.map(e=>e[1]),backgroundColor:'rgba(37,99,235,0.7)',borderRadius:4}]},
                options:{indexAxis:'y',responsive:true,plugins:{legend:{display:false}},scales:{x:{beginAtZero:true}}}
            });
        }
    }

    async function loadPredictions(page){
        const data=await API.getPredictions(page,15);
        if(!data)return;
        document.getElementById('predBody').innerHTML=data.items.length?data.items.map(p=>`
            <tr><td>${p.model_name}</td><td><span class="badge-severity ${p.is_anomaly?'badge-critical':'badge-normal'}">${p.is_anomaly?'Anomaly':'Normal'}</span></td>
            <td>${(p.confidence*100).toFixed(1)}%</td><td>${p.prediction_label}</td>
            <td class="text-mono">${p.src_ip}</td><td class="text-mono">${p.dst_ip}</td>
            <td>${formatTimeAgo(p.created_at)}</td></tr>`).join(''):'<tr><td colspan="7" class="text-center text-muted py-4">No predictions yet</td></tr>';
        document.getElementById('predInfo').textContent=`${data.items.length} of ${data.total}`;
        document.getElementById('predPag').innerHTML=renderPagination(data.page,data.total_pages,'loadPredictions');
    }

    loadPredictions(1);
    loadFeatureImportance('random_forest');
</script></body></html>
