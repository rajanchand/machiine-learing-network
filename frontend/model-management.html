<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="AnomalyGuard Models — Train and manage machine learning models">
    <title>Models — AnomalyGuard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
    <link href="css/style.css" rel="stylesheet">
</head>
<body>
    <div class="app-wrapper" id="app">
        <div class="main-content">
            <!-- Topbar injected by JS -->
            <div class="page-content">
                <div class="breadcrumb-nav"><a href="dashboard.html">Home</a> / Models</div>
                
                <div class="page-header d-flex justify-content-between align-items-center">
                    <h2>Model Management</h2>
                    <button class="btn btn-primary" onclick="openTrainModal()">
                        <i class="fas fa-plus me-2"></i> Train New Model
                    </button>
                </div>

                <!-- Model Cards Grid -->
                <div class="row g-4 mb-4" id="modelsGrid">
                    <!-- Loaded dynamically -->
                    <div class="col-12 text-center py-5 text-muted">
                        <i class="fas fa-circle-notch fa-spin fa-2x mb-3 text-faint"></i>
                        <p>Loading machine learning models...</p>
                    </div>
                </div>

                <!-- Compare Models Section -->
                <div class="table-container">
                    <div class="table-header">
                        <h5><i class="fas fa-balance-scale me-2 text-primary"></i>Model Comparison Matrix</h5>
                        <button class="btn btn-sm btn-outline-secondary" onclick="loadModels()"><i class="fas fa-sync-alt"></i> Refresh</button>
                    </div>
                    <div class="table-responsive">
                        <table class="table table-hover mb-0 text-center">
                            <thead>
                                <tr>
                                    <th class="text-start">Model Name</th>
                                    <th>Status</th>
                                    <th>Accuracy</th>
                                    <th>Precision</th>
                                    <th>Recall</th>
                                    <th>F1-Score</th>
                                    <th>Last Trained</th>
                                    <th>Actions</th>
                                </tr>
                            </thead>
                            <tbody id="modelsTableBody">
                                <!-- Loaded dynamically -->
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Train Model Modal -->
    <div class="modal fade" id="trainModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <form id="trainForm">
                    <div class="modal-header">
                        <h5 class="modal-title"><i class="fas fa-graduation-cap me-2 text-primary"></i>Train Machine Learning Model</h5>
                        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                    </div>
                    <div class="modal-body">
                        <div class="mb-3">
                            <label for="trainModelType" class="form-label fw-600">Algorithm</label>
                            <select class="form-select" id="trainModelType" onchange="adjustParams()">
                                <option value="random_forest">Random Forest Classifier</option>
                                <option value="isolation_forest">Isolation Forest (Anomaly Detection)</option>
                                <option value="decision_tree">Decision Tree Classifier</option>
                                <option value="xgboost">XGBoost Classifier</option>
                            </select>
                        </div>
                        
                        <div class="mb-3">
                            <label for="trainDataset" class="form-label fw-600">Training Dataset</label>
                            <select class="form-select" id="trainDataset" required>
                                <option value="">-- Select Dataset --</option>
                                <!-- Loaded dynamically -->
                            </select>
                        </div>

                        <!-- Hyperparameters -->
                        <div class="card bg-light border-0 mb-3">
                            <div class="card-body">
                                <h6 class="fw-600 mb-3">Hyperparameters</h6>
                                
                                <div id="paramEstimators" class="mb-3">
                                    <label for="estimatorsInput" class="form-label small fw-600">Number of Estimators</label>
                                    <input type="number" class="form-control form-control-sm" id="estimatorsInput" value="100" min="10" max="500">
                                </div>

                                <div id="paramDepth" class="mb-3">
                                    <label for="depthInput" class="form-label small fw-600">Max Depth</label>
                                    <input type="number" class="form-control form-control-sm" id="depthInput" value="10" min="1" max="50">
                                </div>

                                <div id="paramContamination" class="mb-3" style="display: none;">
                                    <label for="contaminationInput" class="form-label small fw-600">Contamination Rate (Expected Anomaly %)</label>
                                    <input type="number" class="form-control form-control-sm" id="contaminationInput" value="0.05" min="0.001" max="0.5" step="0.001">
                                </div>

                                <div id="paramLearningRate" class="mb-3" style="display: none;">
                                    <label for="lrInput" class="form-label small fw-600">Learning Rate</label>
                                    <input type="number" class="form-control form-control-sm" id="lrInput" value="0.1" min="0.01" max="1.0" step="0.01">
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                        <button type="submit" class="btn btn-primary" id="btnTrainSubmit">
                            <i class="fas fa-circle-notch fa-spin me-2" id="trainSpinner" style="display:none"></i>
                            Train Model
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/api.js"></script>
    <script src="js/common.js"></script>
    <script>
        // Initialize layout
        if (!initPageLayout('models', 'Models')) throw new Error('Auth required');

        let trainModal;
        document.addEventListener('DOMContentLoaded', () => {
            trainModal = new bootstrap.Modal(document.getElementById('trainModal'));
        });

        function adjustParams() {
            const type = document.getElementById('trainModelType').value;
            const estimators = document.getElementById('paramEstimators');
            const depth = document.getElementById('paramDepth');
            const contamination = document.getElementById('paramContamination');
            const lr = document.getElementById('paramLearningRate');

            // Reset visibility
            estimators.style.display = 'block';
            depth.style.display = 'block';
            contamination.style.display = 'none';
            lr.style.display = 'none';

            if (type === 'isolation_forest') {
                estimators.style.display = 'block';
                depth.style.display = 'none';
                contamination.style.display = 'block';
            } else if (type === 'decision_tree') {
                estimators.style.display = 'none';
                depth.style.display = 'block';
            } else if (type === 'xgboost') {
                estimators.style.display = 'block';
                depth.style.display = 'block';
                lr.style.display = 'block';
            }
        }

        async function loadModels() {
            const grid = document.getElementById('modelsGrid');
            const tbody = document.getElementById('modelsTableBody');

            try {
                const models = await API.getModels();
                if (models && models.length > 0) {
                    // Render Grid Cards
                    grid.innerHTML = models.map(m => {
                        const statusClass = m.status === 'active' ? 'success' : 'secondary';
                        const statusLabel = m.status === 'active' ? 'Active Inference' : 'Inactive';
                        const badgeColor = m.status === 'active' ? 'badge-active' : 'badge-inactive';
                        const displayTitle = m.model_type.split('_').map(w => w.charAt(0).toUpperCase() + w.slice(1)).join(' ');

                        return `
                            <div class="col-xl-3 col-md-6">
                                <div class="card h-100 border-start-4 border-${statusClass}">
                                    <div class="card-body d-flex flex-column">
                                        <div class="d-flex justify-content-between align-items-center mb-3">
                                            <span class="badge ${badgeColor}">${statusLabel}</span>
                                            <small class="text-muted text-mono">${m.version}</small>
                                        </div>
                                        <h5 class="fw-700 mb-1">${displayTitle}</h5>
                                        <p class="text-muted small mb-3 flex-grow-1">${m.description || 'No description available'}</p>
                                        
                                        <div class="row g-2 mb-3 text-center border-top border-bottom py-2 bg-light rounded">
                                            <div class="col-6">
                                                <div class="text-muted small">Accuracy</div>
                                                <div class="fw-700 text-primary">${formatPercent(m.accuracy)}</div>
                                            </div>
                                            <div class="col-6">
                                                <div class="text-muted small">F1-Score</div>
                                                <div class="fw-700 text-success">${formatPercent(m.f1_score)}</div>
                                            </div>
                                        </div>

                                        <div class="d-flex gap-2">
                                            ${m.status === 'inactive' ? `
                                                <button class="btn btn-sm btn-primary flex-grow-1" onclick="activateModel('${m.name}')">
                                                    <i class="fas fa-bolt me-1"></i> Activate
                                                </button>
                                            ` : `
                                                <button class="btn btn-sm btn-outline-secondary flex-grow-1" disabled>
                                                    <i class="fas fa-check me-1"></i> Running
                                                </button>
                                            `}
                                            <button class="btn btn-sm btn-outline-primary" onclick="retrainModel('${m.name}')" title="Retrain">
                                                <i class="fas fa-sync-alt"></i>
                                            </button>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        `;
                    }).join('');

                    // Render Table Matrix
                    tbody.innerHTML = models.map(m => {
                        const displayTitle = m.model_type.split('_').map(w => w.charAt(0).toUpperCase() + w.slice(1)).join(' ');
                        const badgeColor = m.status === 'active' ? 'badge-active' : 'badge-inactive';
                        return `
                            <tr>
                                <td class="text-start fw-600">${displayTitle}</td>
                                <td><span class="badge-severity ${badgeColor}">${m.status}</span></td>
                                <td class="fw-600 text-primary">${formatPercent(m.accuracy)}</td>
                                <td>${formatPercent(m.precision_score)}</td>
                                <td>${formatPercent(m.recall)}</td>
                                <td class="fw-600 text-success">${formatPercent(m.f1_score)}</td>
                                <td class="text-muted">${formatDateTime(m.trained_at)}</td>
                                <td>
                                    <a href="${API.BASE}/api/v1/ml/download-model/${m.name}" class="btn btn-sm btn-outline-secondary me-1" title="Download Artifact">
                                        <i class="fas fa-download"></i>
                                    </a>
                                </td>
                            </tr>
                        `;
                    }).join('');
                } else {
                    grid.innerHTML = `<div class="col-12 text-center py-5 text-muted">No models found in the database.</div>`;
                    tbody.innerHTML = `<tr><td colspan="8" class="text-center text-muted py-4">No model comparison data available.</td></tr>`;
                }
            } catch (err) {
                grid.innerHTML = `<div class="col-12 text-center py-5 text-danger">Error fetching models.</div>`;
            }
        }

        async function activateModel(name) {
            try {
                const res = await API.activateModel(name);
                if (res) {
                    showToast(`Model ${name} activated successfully for inference.`);
                    loadModels();
                } else {
                    showToast('Failed to activate model.', 'error');
                }
            } catch (err) {
                showToast('Error activating model.', 'error');
            }
        }

        async function retrainModel(name) {
            if (confirm(`Do you want to retrain ${name} with its default settings?`)) {
                showToast(`Retraining job submitted for ${name}...`);
                const res = await API.post(`/api/v1/ml/retrain/${name}`);
                if (res) {
                    showToast(`${name} retrained successfully!`);
                    loadModels();
                } else {
                    showToast('Retraining failed.', 'error');
                }
            }
        }

        async function openTrainModal() {
            // Load datasets for the dropdown
            const datasetSelect = document.getElementById('trainDataset');
            datasetSelect.innerHTML = '<option value="">-- Select Dataset --</option>';
            
            try {
                const datasets = await API.getDatasets();
                if (datasets && datasets.length > 0) {
                    datasets.forEach(d => {
                        const opt = document.createElement('option');
                        opt.value = d.id;
                        opt.textContent = `${d.name} (${formatNumber(d.row_count)} rows)`;
                        datasetSelect.appendChild(opt);
                    });
                }
            } catch (err) {}

            adjustParams();
            trainModal.show();
        }

        document.getElementById('trainForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const modelType = document.getElementById('trainModelType').value;
            const datasetId = document.getElementById('trainDataset').value;
            
            const params = {};
            if (modelType === 'random_forest' || modelType === 'xgboost' || modelType === 'isolation_forest') {
                params.n_estimators = parseInt(document.getElementById('estimatorsInput').value, 10);
            }
            if (modelType === 'random_forest' || modelType === 'xgboost' || modelType === 'decision_tree') {
                params.max_depth = parseInt(document.getElementById('depthInput').value, 10);
            }
            if (modelType === 'isolation_forest') {
                params.contamination = parseFloat(document.getElementById('contaminationInput').value);
            }
            if (modelType === 'xgboost') {
                params.learning_rate = parseFloat(document.getElementById('lrInput').value);
            }

            const btn = document.getElementById('btnTrainSubmit');
            const spinner = document.getElementById('trainSpinner');
            
            btn.disabled = true;
            spinner.style.display = 'inline-block';

            try {
                const res = await API.trainModel(modelType, params);
                if (res) {
                    showToast(`Training complete! New metrics: Acc ${formatPercent(res.metrics.accuracy)}`);
                    trainModal.hide();
                    loadModels();
                } else {
                    showToast('Model training failed', 'error');
                }
            } catch (err) {
                showToast('Error running model training', 'error');
            } finally {
                btn.disabled = false;
                spinner.style.display = 'none';
            }
        });

        // Initial load
        loadModels();
    </script>
</body>
</html>
