<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="AnomalyGuard — Secure Logout">
    <title>Logout — AnomalyGuard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
    <link href="css/style.css" rel="stylesheet">
</head>
<body>
    <div class="auth-page">
        <div class="auth-card text-center">
            <div class="auth-brand">
                <div class="auth-brand-icon"><i class="fas fa-shield-halved"></i></div>
                <h2>AnomalyGuard</h2>
                <p>Network Anomaly Detection System</p>
            </div>
            
            <div class="py-4">
                <i class="fas fa-circle-notch fa-spin fa-3x text-primary mb-3"></i>
                <h5 class="fw-600">Logging out securely...</h5>
                <p class="text-muted small">Clearing session cookies and revoking your access token.</p>
            </div>
        </div>
    </div>

    <script src="js/auth.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // Clear credentials
            AUTH.clearAuth();
            
            // Redirect after 1.5 seconds
            setTimeout(() => {
                window.location.href = 'index.html';
            }, 1500);
        });
    </script>
</body>
</html>
