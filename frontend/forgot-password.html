<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password — AnomalyGuard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
    <link href="css/style.css" rel="stylesheet">
</head>
<body>
    <div class="auth-page">
        <div class="auth-card">
            <div class="auth-brand">
                <div class="auth-brand-icon"><i class="fas fa-key"></i></div>
                <h2>Reset Password</h2>
                <p>Enter your email to receive reset instructions</p>
            </div>
            <div id="fpAlert" class="alert d-none" role="alert"></div>
            <form id="forgotForm" novalidate>
                <div class="mb-3">
                    <label for="email" class="form-label fw-600">Email Address</label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="fas fa-envelope"></i></span>
                        <input type="email" class="form-control" id="email" placeholder="Enter your registered email" required>
                    </div>
                </div>
                <button type="submit" class="btn btn-primary w-100 py-2">
                    <i class="fas fa-paper-plane me-2"></i>Send Reset Link
                </button>
            </form>
            <div class="text-center mt-3" style="font-size:13px">
                <a href="/"><i class="fas fa-arrow-left me-1"></i>Back to Login</a>
            </div>
        </div>
    </div>
    <script>
        document.getElementById('forgotForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const alert = document.getElementById('fpAlert');
            const email = document.getElementById('email').value.trim();
            try {
                const res = await fetch('/api/v1/auth/forgot-password', {
                    method: 'POST', headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ email }),
                });
                const data = await res.json();
                alert.className = 'alert alert-success'; alert.textContent = data.message; alert.classList.remove('d-none');
            } catch {
                alert.className = 'alert alert-danger'; alert.textContent = 'Failed to send reset email'; alert.classList.remove('d-none');
            }
        });
    </script>
</body>
</html>
