<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Attack Detection — AnomalyGuard</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"><link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet"><link href="css/style.css" rel="stylesheet"></head><body>
<div class="app-wrapper" id="app"><div class="main-content"><div class="page-content">
    <div class="breadcrumb-nav"><a href="dashboard.html">Home</a> / Attack Detection</div>
    <div class="page-header"><h2>Attack Detection</h2>
        <div class="d-flex gap-2">
            <input type="text" class="form-control form-control-sm" id="searchBox" placeholder="Search IP..." style="width:200px" onkeyup="loadAttacks(1)">
            <select class="form-select form-select-sm" id="typeFilter" style="width:140px" onchange="loadAttacks(1)"><option value="">All Types</option><option>DDoS</option><option>DoS</option><option>Port Scan</option><option>Brute Force</option><option>Botnet</option><option>SSH Attack</option><option>DNS Attack</option></select>
            <select class="form-select form-select-sm" id="sevFilter" style="width:130px" onchange="loadAttacks(1)"><option value="">All Severity</option><option value="critical">Critical</option><option value="high">High</option><option value="medium">Medium</option><option value="low">Low</option></select>
        </div>
    </div>
    <div class="table-container">
        <div class="table-responsive"><table class="table table-hover table-sm mb-0"><thead><tr><th>Type</th><th>Severity</th><th>Confidence</th><th>Source IP</th><th>Dest IP</th><th>Protocol</th><th>Blocked</th><th>Time</th><th>Actions</th></tr></thead>
        <tbody id="atkBody"><tr><td colspan="9" class="text-center text-muted py-4">Loading...</td></tr></tbody></table></div>
        <div class="pagination-wrapper"><span id="atkInfo">—</span><div id="atkPag"></div></div>
    </div>

    <div class="card mt-3"><div class="card-header d-flex justify-content-between align-items-center"><h5 class="card-title mb-0"><i class="fas fa-ban me-2 text-danger"></i>Blocked IPs</h5></div>
    <div class="card-body">
        <div class="row g-2 mb-3">
            <div class="col-md-4"><input type="text" class="form-control form-control-sm" id="blockIP" placeholder="IP Address"></div>
            <div class="col-md-4"><input type="text" class="form-control form-control-sm" id="blockReason" placeholder="Reason"></div>
            <div class="col-md-4"><button class="btn btn-danger btn-sm w-100" onclick="blockIP()"><i class="fas fa-ban me-1"></i>Block IP</button></div>
        </div>
        <table class="table table-sm mb-0"><thead><tr><th>IP Address</th><th>Reason</th><th>Attack Type</th><th>Blocked At</th></tr></thead><tbody id="blockedBody"><tr><td colspan="4" class="text-muted text-center">No blocked IPs</td></tr></tbody></table>
    </div></div>
</div></div></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/auth.js"></script><script src="js/api.js"></script><script src="js/common.js"></script>
<script>
    if(!initPageLayout('attacks','Attack Detection'))throw new Error('Auth');
    async function loadAttacks(page){
        const data=await API.getAttacks(page,25,document.getElementById('typeFilter').value,document.getElementById('sevFilter').value,document.getElementById('searchBox').value);
        if(!data)return;
        document.getElementById('atkBody').innerHTML=data.items.length?data.items.map(a=>`
            <tr><td><strong>${a.attack_type}</strong></td><td>${severityBadge(a.severity)}</td>
            <td>${(a.confidence*100).toFixed(1)}%</td><td class="text-mono">${a.src_ip}</td><td class="text-mono">${a.dst_ip}</td>
            <td>${a.protocol}</td><td>${a.is_blocked?'<span class="badge bg-danger">Blocked</span>':'<span class="badge bg-secondary">Active</span>'}</td>
            <td>${formatTimeAgo(a.detected_at)}</td>
            <td><button class="btn btn-outline-danger btn-sm" onclick="blockIP('${a.src_ip}','Attack: ${a.attack_type}','${a.attack_type}')"><i class="fas fa-ban"></i></button></td></tr>
        `).join(''):'<tr><td colspan="9" class="text-center text-muted py-4">No attacks detected</td></tr>';
        document.getElementById('atkInfo').textContent=`${data.items.length} of ${data.total}`;
        document.getElementById('atkPag').innerHTML=renderPagination(data.page,data.total_pages,'loadAttacks');
    }
    async function blockIP(ip,reason,type){
        ip=ip||document.getElementById('blockIP').value;
        reason=reason||document.getElementById('blockReason').value;
        if(!ip){showToast('Enter an IP address','error');return;}
        await API.blockIP(ip,reason,type);showToast(`IP ${ip} blocked`);loadBlockedIPs();loadAttacks(1);
    }
    async function loadBlockedIPs(){
        const data=await API.getBlockedIPs();
        document.getElementById('blockedBody').innerHTML=data&&data.length?data.map(b=>`
            <tr><td class="text-mono">${b.ip_address}</td><td>${b.reason}</td><td>${b.attack_type||'—'}</td><td>${formatDateTime(b.blocked_at)}</td></tr>
        `).join(''):'<tr><td colspan="4" class="text-muted text-center">No blocked IPs</td></tr>';
    }
    loadAttacks(1);loadBlockedIPs();
</script></body></html>
