<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="AnomalyGuard — ML-Based Network Anomaly Detection System Login">
    <title>Login — AnomalyGuard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
    <link href="css/style.css" rel="stylesheet">
</head>
<body>
    <div class="auth-page">
        <div class="auth-card">
            <div class="auth-brand">
                <div class="auth-brand-icon"><i class="fas fa-shield-halved"></i></div>
                <h2>AnomalyGuard</h2>
                <p>Network Anomaly Detection System</p>
            </div>

            <div id="loginAlert" class="alert alert-danger d-none" role="alert"></div>

            <form id="loginForm" novalidate>
                <div class="mb-3">
                    <label for="username" class="form-label fw-600">Username</label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="fas fa-user"></i></span>
                        <input type="text" class="form-control" id="username" placeholder="Enter username" required autofocus>
                    </div>
                </div>
                <div class="mb-3">
                    <label for="password" class="form-label fw-600">Password</label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="fas fa-lock"></i></span>
                        <input type="password" class="form-control" id="password" placeholder="Enter password" required>
                    </div>
                </div>
                <div class="mb-3 d-flex justify-content-between align-items-center">
                    <div class="form-check">
                        <input class="form-check-input" type="checkbox" id="rememberMe">
                        <label class="form-check-label" for="rememberMe">Remember me</label>
                    </div>
                    <a href="forgot-password.html" class="text-decoration-none" style="font-size:13px">Forgot Password?</a>
                </div>
                <button type="submit" class="btn btn-primary w-100 py-2" id="loginBtn">
                    <i class="fas fa-sign-in-alt me-2"></i>Sign In
                </button>
            </form>

            <div class="text-center mt-3" style="font-size:13px">
                Don't have an account? <a href="register.html">Register here</a>
            </div>

            <hr class="my-3">
            <div class="text-center" style="font-size: 11px; color: var(--text-faint);">
                Default: <strong>admin</strong> / <strong>admin123</strong>
            </div>
        </div>
    </div>

    <script src="js/auth.js"></script>
    <script>
        // Redirect if already logged in
        if (AUTH.isAuthenticated()) {
            window.location.href = 'dashboard.html';
        }

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('loginBtn');
            const alert = document.getElementById('loginAlert');

            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;

            if (!username || !password) {
                alert.textContent = 'Please enter both username and password';
                alert.classList.remove('d-none');
                return;
            }

            btn.disabled = true;
            btn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span>Signing in...';
            alert.classList.add('d-none');

            try {
                await AUTH.login(username, password);
                window.location.href = 'dashboard.html';
            } catch (err) {
                alert.textContent = err.message;
                alert.classList.remove('d-none');
                btn.disabled = false;
                btn.innerHTML = '<i class="fas fa-sign-in-alt me-2"></i>Sign In';
            }
        });
    </script>
</body>
</html>
