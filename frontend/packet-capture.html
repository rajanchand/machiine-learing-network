<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Packet Capture — AnomalyGuard</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"><link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet"><link href="css/style.css" rel="stylesheet"></head><body>
<div class="app-wrapper" id="app"><div class="main-content"><div class="page-content">
    <div class="breadcrumb-nav"><a href="dashboard.html">Home</a> / Packet Capture</div>
    <div class="page-header"><h2>Packet Capture</h2>
        <div class="d-flex gap-2">
            <button class="btn btn-success btn-sm" onclick="startCap()"><i class="fas fa-play me-1"></i>Start Capture</button>
            <button class="btn btn-danger btn-sm" onclick="stopCap()"><i class="fas fa-stop me-1"></i>Stop Capture</button>
            <a href="/api/v1/packets/export/csv" class="btn btn-outline-primary btn-sm" target="_blank"><i class="fas fa-download me-1"></i>Export CSV</a>
        </div>
    </div>
    <div class="row g-3 mb-3">
        <div class="col-md-4"><input type="text" class="form-control form-control-sm" id="searchBox" placeholder="Search by IP..." onkeyup="loadPackets(1)"></div>
        <div class="col-md-3"><select class="form-select form-select-sm" id="protoFilter" onchange="loadPackets(1)"><option value="">All Protocols</option><option>TCP</option><option>UDP</option><option>ICMP</option><option>HTTP</option><option>HTTPS</option><option>DNS</option></select></div>
        <div class="col-md-3"><select class="form-select form-select-sm" id="statusFilter" onchange="loadPackets(1)"><option value="">All Status</option><option>Normal</option><option>Suspicious</option><option>Malicious</option></select></div>
    </div>
    <div class="table-container">
        <div class="table-responsive"><table class="table table-hover table-sm mb-0"><thead><tr><th>ID</th><th>Timestamp</th><th>Source IP</th><th>Destination IP</th><th>Protocol</th><th>Src Port</th><th>Dst Port</th><th>Size</th><th>TTL</th><th>Flags</th><th>Status</th></tr></thead><tbody id="pktBody"><tr><td colspan="11" class="text-center text-muted py-4">Loading...</td></tr></tbody></table></div>
        <div class="pagination-wrapper"><span id="pktInfo">—</span><div id="pktPagination"></div></div>
    </div>
</div></div></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/auth.js"></script><script src="js/api.js"></script><script src="js/common.js"></script>
<script>
    if(!initPageLayout('packets','Packet Capture'))throw new Error('Auth');
    async function startCap(){const r=await API.startCapture('eth0');if(r)showToast('Capture started');loadPackets(1);}
    async function stopCap(){await API.stopCapture();showToast('Capture stopped');}
    async function loadPackets(page){
        const search=document.getElementById('searchBox').value;
        const proto=document.getElementById('protoFilter').value;
        const status=document.getElementById('statusFilter').value;
        const data=await API.getPackets(page,25,proto,status,search);
        if(!data)return;
        document.getElementById('pktBody').innerHTML=data.items.length?data.items.map(p=>`
            <tr><td class="text-mono" style="font-size:11px">${String(p.id).substring(0,8)}</td><td>${formatDateTime(p.timestamp)}</td>
            <td class="text-mono">${p.src_ip}</td><td class="text-mono">${p.dst_ip}</td>
            <td><span class="badge bg-secondary">${p.protocol}</span></td><td>${p.src_port}</td><td>${p.dst_port}</td>
            <td>${p.packet_size}B</td><td>${p.ttl}</td><td>${p.flags||'—'}</td>
            <td><span class="badge-severity badge-${p.status.toLowerCase()}">${p.status}</span></td></tr>
        `).join(''):'<tr><td colspan="11" class="text-center text-muted py-4">No packets found</td></tr>';
        document.getElementById('pktInfo').textContent=`Showing ${data.items.length} of ${data.total} packets`;
        document.getElementById('pktPagination').innerHTML=renderPagination(data.page,data.total_pages,'loadPackets');
    }
    loadPackets(1);
</script></body></html>
