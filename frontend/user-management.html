<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="AnomalyGuard User Management — Control users and system access">
    <title>Users — AnomalyGuard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
    <link href="css/style.css" rel="stylesheet">
</head>
<body>
    <div class="app-wrapper" id="app">
        <div class="main-content">
            <!-- Topbar injected by JS -->
            <div class="page-content">
                <div class="breadcrumb-nav"><a href="dashboard.html">Home</a> / Users</div>
                
                <div class="page-header d-flex justify-content-between align-items-center">
                    <h2>User Accounts</h2>
                    <button class="btn btn-primary" onclick="openAddModal()">
                        <i class="fas fa-user-plus me-2"></i> Add User
                    </button>
                </div>

                <!-- Users Table Card -->
                <div class="table-container">
                    <div class="table-header d-flex flex-wrap gap-3 align-items-center justify-content-between">
                        <h5><i class="fas fa-users me-2 text-primary"></i>System Access List</h5>
                        <div class="d-flex gap-2">
                            <input type="text" class="form-control form-control-sm" id="searchUser" placeholder="Search by name/email..." onkeyup="searchUsers()">
                            <button class="btn btn-sm btn-outline-secondary" onclick="loadUsers()"><i class="fas fa-sync-alt"></i></button>
                        </div>
                    </div>
                    <div class="table-responsive">
                        <table class="table table-hover mb-0">
                            <thead>
                                <tr>
                                    <th>Full Name</th>
                                    <th>Username</th>
                                    <th>Email</th>
                                    <th>Role</th>
                                    <th>Status</th>
                                    <th>Last Login</th>
                                    <th>Created At</th>
                                    <th class="text-end">Actions</th>
                                </tr>
                            </thead>
                            <tbody id="usersList">
                                <tr>
                                    <td colspan="8" class="text-center text-muted py-5">
                                        <i class="fas fa-circle-notch fa-spin fa-2x mb-3 text-faint"></i>
                                        <p class="mb-0">Loading users...</p>
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                    <div class="pagination-wrapper">
                        <div id="paginationInfo">Showing 0 to 0 of 0 users</div>
                        <div id="paginationLinks"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Add User Modal -->
    <div class="modal fade" id="addModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <form id="addUserForm">
                    <div class="modal-header">
                        <h5 class="modal-title"><i class="fas fa-user-plus me-2 text-primary"></i>Create New User</h5>
                        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                    </div>
                    <div class="modal-body">
                        <div class="mb-3">
                            <label for="addFullName" class="form-label fw-600">Full Name</label>
                            <input type="text" class="form-control" id="addFullName" required>
                        </div>
                        <div class="mb-3">
                            <label for="addEmail" class="form-label fw-600">Email Address</label>
                            <input type="email" class="form-control" id="addEmail" required>
                        </div>
                        <div class="mb-3">
                            <label for="addUsername" class="form-label fw-600">Username</label>
                            <input type="text" class="form-control" id="addUsername" required minlength="3">
                        </div>
                        <div class="mb-3">
                            <label for="addPassword" class="form-label fw-600">Temporary Password</label>
                            <input type="password" class="form-control" id="addPassword" required minlength="6">
                        </div>
                        <div class="mb-3">
                            <label for="addRole" class="form-label fw-600">RBAC Role</label>
                            <select class="form-select" id="addRole">
                                <option value="viewer">Viewer (Read-only)</option>
                                <option value="analyst" selected>Analyst (Inference & Training)</option>
                                <option value="admin">Administrator (Full Access)</option>
                            </select>
                        </div>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                        <button type="submit" class="btn btn-primary">Create User</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <!-- Edit User Modal -->
    <div class="modal fade" id="editModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <form id="editUserForm">
                    <input type="hidden" id="editUserId">
                    <div class="modal-header">
                        <h5 class="modal-title"><i class="fas fa-user-edit me-2 text-primary"></i>Modify User Access</h5>
                        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                    </div>
                    <div class="modal-body">
                        <div class="mb-3">
                            <label for="editFullName" class="form-label fw-600">Full Name</label>
                            <input type="text" class="form-control" id="editFullName" required>
                        </div>
                        <div class="mb-3">
                            <label for="editEmail" class="form-label fw-600">Email Address</label>
                            <input type="email" class="form-control" id="editEmail" required>
                        </div>
                        <div class="mb-3">
                            <label for="editRole" class="form-label fw-600">Role</label>
                            <select class="form-select" id="editRole">
                                <option value="viewer">Viewer</option>
                                <option value="analyst">Analyst</option>
                                <option value="admin">Administrator</option>
                            </select>
                        </div>
                        <div class="mb-3">
                            <label for="editStatus" class="form-label fw-600">Status</label>
                            <select class="form-select" id="editStatus">
                                <option value="active">Active</option>
                                <option value="inactive">Inactive</option>
                                <option value="suspended">Suspended</option>
                            </select>
                        </div>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                        <button type="submit" class="btn btn-primary">Save Changes</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/api.js"></script>
    <script src="js/common.js"></script>
    <script>
        // Initialize layout
        if (!initPageLayout('users', 'Users')) throw new Error('Auth required');

        let addModal, editModal;
        let currentPage = 1;
        const perPage = 10;
        let searchTimeout;

        document.addEventListener('DOMContentLoaded', () => {
            addModal = new bootstrap.Modal(document.getElementById('addModal'));
            editModal = new bootstrap.Modal(document.getElementById('editModal'));
        });

        async function loadUsers(page = 1) {
            currentPage = page;
            const search = document.getElementById('searchUser').value;
            const list = document.getElementById('usersList');
            
            try {
                const res = await API.getUsers(page, perPage, search);
                if (res && res.items) {
                    if (res.items.length > 0) {
                        list.innerHTML = res.items.map(u => {
                            const roleBadge = u.role === 'admin' ? 'bg-primary text-white' : u.role === 'analyst' ? 'bg-success text-white' : 'bg-light text-dark';
                            const statusBadge = u.status === 'active' ? 'bg-success-light text-success' : u.status === 'suspended' ? 'bg-danger-light text-danger' : 'bg-light text-muted';
                            
                            return `
                                <tr>
                                    <td class="fw-600">${u.full_name}</td>
                                    <td>@${u.username}</td>
                                    <td>${u.email}</td>
                                    <td><span class="badge ${roleBadge}">${u.role}</span></td>
                                    <td><span class="badge ${statusBadge} text-capitalize">${u.status}</span></td>
                                    <td>${formatDateTime(u.last_login)}</td>
                                    <td>${formatDateTime(u.created_at)}</td>
                                    <td class="text-end">
                                        <button class="btn btn-sm btn-outline-primary me-1" onclick="openEditModal('${u.id}', '${u.full_name}', '${u.email}', '${u.role}', '${u.status}')">
                                            <i class="fas fa-pencil-alt"></i>
                                        </button>
                                        <button class="btn btn-sm btn-outline-danger" onclick="deleteUser('${u.id}')">
                                            <i class="fas fa-trash-alt"></i>
                                        </button>
                                    </td>
                                </tr>
                            `;
                        }).join('');
                    } else {
                        list.innerHTML = '<tr><td colspan="8" class="text-center text-muted py-5">No users found.</td></tr>';
                    }

                    // Pagination
                    const start = (res.page - 1) * res.per_page + 1;
                    const end = Math.min(start + res.items.length - 1, res.total);
                    document.getElementById('paginationInfo').textContent = res.total > 0 ? `Showing ${start} to ${end} of ${res.total} users` : 'Showing 0 users';
                    document.getElementById('paginationLinks').innerHTML = renderPagination(res.page, res.total_pages, 'loadUsers');
                }
            } catch (err) {
                list.innerHTML = '<tr><td colspan="8" class="text-center text-danger py-5">Failed to fetch users list.</td></tr>';
            }
        }

        function searchUsers() {
            clearTimeout(searchTimeout);
            searchTimeout = setTimeout(() => {
                loadUsers(1);
            }, 300);
        }

        function openAddModal() {
            document.getElementById('addUserForm').reset();
            addModal.show();
        }

        document.getElementById('addUserForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const data = {
                username: document.getElementById('addUsername').value,
                email: document.getElementById('addEmail').value,
                password: document.getElementById('addPassword').value,
                full_name: document.getElementById('addFullName').value,
                role: document.getElementById('addRole').value
            };

            const res = await API.createUser(data);
            if (res) {
                showToast('User account created successfully!');
                addModal.hide();
                loadUsers(1);
            } else {
                showToast('Failed to create user. Username/email might be in use.', 'error');
            }
        });

        function openEditModal(id, fullName, email, role, status) {
            document.getElementById('editUserId').value = id;
            document.getElementById('editFullName').value = fullName;
            document.getElementById('editEmail').value = email;
            document.getElementById('editRole').value = role;
            document.getElementById('editStatus').value = status;
            editModal.show();
        }

        document.getElementById('editUserForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const id = document.getElementById('editUserId').value;
            const data = {
                full_name: document.getElementById('editFullName').value,
                email: document.getElementById('editEmail').value,
                role: document.getElementById('editRole').value,
                status: document.getElementById('editStatus').value
            };

            const res = await API.updateUser(id, data);
            if (res) {
                showToast('User account updated successfully!');
                editModal.hide();
                loadUsers(currentPage);
            } else {
                showToast('Failed to update user details', 'error');
            }
        });

        async function deleteUser(id) {
            if (confirm('Are you sure you want to permanently delete this user account?')) {
                const res = await API.deleteUser(id);
                if (res) {
                    showToast('User deleted successfully');
                    loadUsers(currentPage);
                } else {
                    showToast('Failed to delete user account', 'error');
                }
            }
        }

        // Initial load
        loadUsers(1);
    </script>
</body>
</html>
