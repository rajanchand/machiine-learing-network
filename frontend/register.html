<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register — AnomalyGuard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
    <link href="css/style.css" rel="stylesheet">
</head>
<body>
    <div class="auth-page">
        <div class="auth-card">
            <div class="auth-brand">
                <div class="auth-brand-icon"><i class="fas fa-shield-halved"></i></div>
                <h2>Create Account</h2>
                <p>Join AnomalyGuard Network Security</p>
            </div>
            <div id="regAlert" class="alert d-none" role="alert"></div>
            <form id="registerForm" novalidate>
                <div class="mb-3">
                    <label for="fullName" class="form-label fw-600">Full Name</label>
                    <input type="text" class="form-control" id="fullName" placeholder="Enter your full name" required>
                </div>
                <div class="mb-3">
                    <label for="email" class="form-label fw-600">Email</label>
                    <input type="email" class="form-control" id="email" placeholder="Enter email address" required>
                </div>
                <div class="mb-3">
                    <label for="username" class="form-label fw-600">Username</label>
                    <input type="text" class="form-control" id="username" placeholder="Choose a username" required>
                </div>
                <div class="mb-3">
                    <label for="password" class="form-label fw-600">Password</label>
                    <input type="password" class="form-control" id="password" placeholder="Create password (min 6 chars)" required minlength="6">
                </div>
                <div class="mb-3">
                    <label for="confirmPassword" class="form-label fw-600">Confirm Password</label>
                    <input type="password" class="form-control" id="confirmPassword" placeholder="Confirm your password" required>
                </div>
                <div class="mb-3 form-check">
                    <input class="form-check-input" type="checkbox" id="terms" required>
                    <label class="form-check-label" for="terms" style="font-size:13px">I agree to the Terms & Conditions</label>
                </div>
                <button type="submit" class="btn btn-primary w-100 py-2" id="regBtn">
                    <i class="fas fa-user-plus me-2"></i>Register
                </button>
            </form>
            <div class="text-center mt-3" style="font-size:13px">
                Already have an account? <a href="/">Sign in</a>
            </div>
        </div>
    </div>
    <script src="js/auth.js"></script>
    <script>
        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const alert = document.getElementById('regAlert');
            const btn = document.getElementById('regBtn');
            const fullName = document.getElementById('fullName').value.trim();
            const email = document.getElementById('email').value.trim();
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;

            if (password !== confirmPassword) {
                alert.className = 'alert alert-danger'; alert.textContent = 'Passwords do not match'; alert.classList.remove('d-none'); return;
            }
            btn.disabled = true; btn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span>Registering...';
            try {
                await AUTH.register(username, email, password, fullName);
                alert.className = 'alert alert-success'; alert.textContent = 'Registration successful! Redirecting to login...'; alert.classList.remove('d-none');
                setTimeout(() => window.location.href = '/', 2000);
            } catch (err) {
                alert.className = 'alert alert-danger'; alert.textContent = err.message; alert.classList.remove('d-none');
                btn.disabled = false; btn.innerHTML = '<i class="fas fa-user-plus me-2"></i>Register';
            }
        });
    </script>
</body>
</html>
