<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="AnomalyGuard Reports — Generate and download network security reports">
    <title>Reports — AnomalyGuard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
    <link href="css/style.css" rel="stylesheet">
</head>
<body>
    <div class="app-wrapper" id="app">
        <div class="main-content">
            <!-- Topbar injected by JS -->
            <div class="page-content">
                <div class="breadcrumb-nav"><a href="dashboard.html">Home</a> / Reports</div>
                
                <div class="page-header">
                    <h2>Reports Management</h2>
                </div>

                <div class="row g-4">
                    <!-- Column 1: Generate Report Form -->
                    <div class="col-lg-4">
                        <div class="card">
                            <div class="card-header">
                                <h5 class="card-title mb-0"><i class="fas fa-file-invoice me-2 text-primary"></i>Generate New Report</h5>
                            </div>
                            <div class="card-body">
                                <form id="reportForm">
                                    <div class="mb-3">
                                        <label for="reportType" class="form-label fw-600">Report Type</label>
                                        <select class="form-select" id="reportType" onchange="toggleDateRange()">
                                            <option value="daily">Daily Security Report</option>
                                            <option value="weekly">Weekly Traffic Report</option>
                                            <option value="monthly">Monthly System Summary</option>
                                            <option value="custom">Custom Date Range</option>
                                        </select>
                                    </div>
                                    
                                    <div class="mb-3" id="dateRangeWrapper" style="display: none;">
                                        <div class="row g-2">
                                            <div class="col-6">
                                                <label for="dateFrom" class="form-label fw-600">Date From</label>
                                                <input type="date" class="form-control" id="dateFrom">
                                            </div>
                                            <div class="col-6">
                                                <label for="dateTo" class="form-label fw-600">Date To</label>
                                                <input type="date" class="form-control" id="dateTo">
                                            </div>
                                        </div>
                                    </div>

                                    <div class="mb-4">
                                        <label class="form-label fw-600">Export Format</label>
                                        <div class="d-flex gap-3">
                                            <div class="form-check">
                                                <input class="form-check-input" type="radio" name="reportFormat" id="formatPDF" value="pdf" checked>
                                                <label class="form-check-label" for="formatPDF">
                                                    <i class="far fa-file-pdf text-danger me-1"></i> PDF
                                                </label>
                                            </div>
                                            <div class="form-check">
                                                <input class="form-check-input" type="radio" name="reportFormat" id="formatExcel" value="excel">
                                                <label class="form-check-label" for="formatExcel">
                                                    <i class="far fa-file-excel text-success me-1"></i> Excel
                                                </label>
                                            </div>
                                            <div class="form-check">
                                                <input class="form-check-input" type="radio" name="reportFormat" id="formatCSV" value="csv">
                                                <label class="form-check-label" for="formatCSV">
                                                    <i class="far fa-file-alt text-primary me-1"></i> CSV
                                                </label>
                                            </div>
                                        </div>
                                    </div>

                                    <button type="submit" class="btn btn-primary w-100 py-2">
                                        <i class="fas fa-cog fa-spin me-2" id="btnSpinner" style="display: none;"></i>
                                        <i class="fas fa-magic me-2" id="btnIcon"></i> Generate Report
                                    </button>
                                </form>
                            </div>
                        </div>
                    </div>

                    <!-- Column 2: Generated Reports List -->
                    <div class="col-lg-8">
                        <div class="table-container">
                            <div class="table-header">
                                <h5><i class="fas fa-history me-2 text-primary"></i>Generated Reports Archive</h5>
                                <button class="btn btn-sm btn-outline-secondary" onclick="loadReports()"><i class="fas fa-sync-alt"></i> Refresh</button>
                            </div>
                            <div class="table-responsive">
                                <table class="table table-hover mb-0">
                                    <thead>
                                        <tr>
                                            <th>Report Name</th>
                                            <th>Type</th>
                                            <th>Format</th>
                                            <th>Size</th>
                                            <th>Generated At</th>
                                            <th class="text-end">Actions</th>
                                        </tr>
                                    </thead>
                                    <tbody id="reportsList">
                                        <tr>
                                            <td colspan="6" class="text-center text-muted py-5">
                                                <i class="fas fa-circle-notch fa-spin fa-2x mb-3 text-faint"></i>
                                                <p class="mb-0">Loading reports...</p>
                                            </td>
                                        </tr>
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/api.js"></script>
    <script src="js/common.js"></script>
    <script>
        // Initialize layout
        if (!initPageLayout('reports', 'Reports')) throw new Error('Auth required');

        function toggleDateRange() {
            const type = document.getElementById('reportType').value;
            const wrapper = document.getElementById('dateRangeWrapper');
            if (type === 'custom') {
                wrapper.style.display = 'block';
            } else {
                wrapper.style.display = 'none';
            }
        }

        async function loadReports() {
            const list = document.getElementById('reportsList');
            try {
                const reports = await API.getReports();
                if (reports && reports.length > 0) {
                    list.innerHTML = reports.map(r => `
                        <tr>
                            <td class="fw-600">${r.name}</td>
                            <td><span class="badge bg-light text-dark text-capitalize">${r.report_type}</span></td>
                            <td>
                                <span class="badge ${r.report_format === 'pdf' ? 'bg-danger-light text-danger' : r.report_format === 'excel' ? 'bg-success-light text-success' : 'bg-primary-light text-primary'} text-uppercase">
                                    ${r.report_format}
                                </span>
                            </td>
                            <td>${formatFileSize(r.file_size)}</td>
                            <td>${formatDateTime(r.created_at)}</td>
                            <td class="text-end">
                                <a href="${API.BASE}/api/v1/reports/${r.id}/download" class="btn btn-sm btn-outline-primary me-1" title="Download">
                                    <i class="fas fa-download"></i>
                                </a>
                                <button class="btn btn-sm btn-outline-danger" onclick="deleteReport('${r.id}')" title="Delete">
                                    <i class="fas fa-trash-alt"></i>
                                </button>
                            </td>
                        </tr>
                    `).join('');
                } else {
                    list.innerHTML = `<tr><td colspan="6" class="text-center text-muted py-5">No reports found. Generate one to get started!</td></tr>`;
                }
            } catch (error) {
                list.innerHTML = `<tr><td colspan="6" class="text-center text-danger py-5">Error loading reports. Please check backend connection.</td></tr>`;
            }
        }

        async function deleteReport(id) {
            if (confirm('Are you sure you want to delete this report?')) {
                const res = await API.deleteReport(id);
                if (res) {
                    showToast('Report deleted successfully');
                    loadReports();
                } else {
                    showToast('Failed to delete report', 'error');
                }
            }
        }

        document.getElementById('reportForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const type = document.getElementById('reportType').value;
            const format = document.querySelector('input[name="reportFormat"]:checked').value;
            const dateFrom = document.getElementById('dateFrom').value;
            const dateTo = document.getElementById('dateTo').value;

            const spinner = document.getElementById('btnSpinner');
            const icon = document.getElementById('btnIcon');
            spinner.style.display = 'inline-block';
            icon.style.display = 'none';

            try {
                const res = await API.generateReport(type, format, dateFrom || null, dateTo || null);
                if (res) {
                    showToast('Report generated successfully!');
                    loadReports();
                } else {
                    showToast('Failed to generate report', 'error');
                }
            } catch (err) {
                showToast('Error during report generation', 'error');
            } finally {
                spinner.style.display = 'none';
                icon.style.display = 'inline-block';
            }
        });

        // Load initially
        loadReports();
    </script>
</body>
</html>
